<!DOCTYPE html>
<html>
<head>
  <title>Connect 4</title>
  <style>
    body {
      margin:0;
      font-family:sans-serif;
      background:#0f172a;
      color:white;
      display:flex;
      justify-content:center;
    }

    .container {
      width:900px;
      margin-top:40px;
      text-align:center;
    }

    h1 {
      margin-bottom:10px;
      font-size:32px;
    }

    .controls {
      display:flex;
      justify-content:center;
      gap:20px;
      margin-bottom:20px;
      flex-wrap:wrap;
    }

    .control {
      background:#1e293b;
      padding:10px 15px;
      border-radius:10px;
    }

    select, input {
      margin-left:8px;
      padding:5px;
      border-radius:5px;
      border:none;
    }

    button {
      background:#22c55e;
      border:none;
      padding:10px 15px;
      border-radius:8px;
      font-weight:bold;
      cursor:pointer;
    }

    button:hover {
      background:#16a34a;
    }

    .board {
      display:grid;
      grid-template-columns: repeat(7,80px);
      gap:10px;
      background:#2563eb;
      padding:15px;
      border-radius:20px;
      justify-content:center;
    }

    .cell {
      width:80px;
      height:80px;
      border-radius:50%;
      background:#0b1020;
      position:relative;
      cursor:pointer;
    }

    .piece {
      position:absolute;
      width:100%;
      height:100%;
      border-radius:50%;
      transition: transform 0.25s ease;
    }

    .player { background:red; }
    .ai { background:yellow; }
  </style>
</head>

<body>
<div class="container">

  <h1>Connect 4</h1>

  <div class="controls">
    <div class="control">
      Difficulty:
      <input type="number" id="depth" value="8" min="1" max="14">
    </div>

    <div class="control">
      You play:
      <select id="side">
        <option value="first">First (Red)</option>
        <option value="second">Second (Yellow)</option>
      </select>
    </div>

    <div class="control">
      Mode:
      <select id="mode">
        <option value="ai">Vs AI</option>
        <option value="manual">Manual</option>
      </select>
    </div>

    <button onclick="startGame()">Reset</button>
  </div>

  <div class="board" id="board"></div>

</div>

<script>
const WIDTH = 7;
const HEIGHT = 6;

let state = null;
let prevGrid = null;
let locked = false;

const boardEl = document.getElementById("board");

function render() {
  boardEl.innerHTML = "";

  for (let r = 0; r < HEIGHT; r++) {
    for (let c = 0; c < WIDTH; c++) {
      const cell = document.createElement("div");
      cell.className = "cell";
      cell.onclick = () => play(c);

      const val = state.grid[r][c];

      if (val !== "_") {
        const piece = document.createElement("div");
        piece.className = "piece " + (val === "X" ? "player" : "ai");

        if (!prevGrid || prevGrid[r][c] !== val) {
          piece.style.transform = "translateY(-500px)";
          setTimeout(() => piece.style.transform = "translateY(0)", 10);
        }

        cell.appendChild(piece);
      }

      boardEl.appendChild(cell);
    }
  }

  prevGrid = JSON.parse(JSON.stringify(state.grid));
}

async function startGame() {
  const res = await fetch("/new", { method: "POST" });
  state = await res.json();
  prevGrid = null;

  if (document.getElementById("side").value === "second") {
    await fetch("/play", {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({col:3})
    }).then(r=>r.json()).then(d=>state=d);
  }

  render();
}

async function play(col) {
  if (locked || state.winner || state.draw) return;

  const mode = document.getElementById("mode").value;

  locked = true;

  const res = await fetch("/play", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      col: col,
      mode: mode
    })
  });

  state = await res.json();
  locked = false;

  render();
}

startGame();
</script>

</body>
</html>
